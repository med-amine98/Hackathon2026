name: ai_insurance_advisor
description: AI Insurance Advisor Mobile Application
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ── UI & Design ──────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.7
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0+1
  shimmer: ^3.0.0
  
  # ── State Management ─────────────────────────────────────────────────────
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4
  
  # ── Networking ──────────────────────────────────────────────────────────
  dio: ^5.3.2
  retrofit: ^4.0.1
  json_annotation: ^4.8.1
  http: ^1.1.0
  
  # ── Geolocation ──────────────────────────────────────────────────────────
  geolocator: ^10.1.0
  
  # ── Map (OpenStreetMap - compatible web) ───────────────────────────────
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # ── Local Storage ───────────────────────────────────────────────────────
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # ── Navigation ──────────────────────────────────────────────────────────
  go_router: ^12.1.3
  
  # ── PDF Generation ─────────────────────────────────────────────────────
  pdf: ^3.10.4
  printing: ^5.11.1
  path_provider: ^2.1.0
  share_plus: ^7.2.1
  
  # ── Utilities ──────────────────────────────────────────────────────────
  intl: ^0.18.1
  image_picker: ^1.0.4
  permission_handler: ^11.0.1
  connectivity_plus: ^5.0.1
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.1.14

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  retrofit_generator: ^8.0.0
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
    - .env