# DEPRECATED — this used to spin up its own separate Postgres for the mobile
# backend. The mobile backend now shares the ONE Postgres database used by
# the agent's platform backend (its own "mobile" schema in that same
# instance, see app/database/connection.py), so everything now runs from
# the root-level docker-compose.yml's "mobile-api" service instead. Left in
# place for reference/standalone local dev only — don't run this alongside
# the root compose file (it would stand up a second, unrelated Postgres and
# defeat the point):
#   cd /home/saoussen/insurance/Hackathon2026 && docker compose up --build

version: '3.9'

services:

  # ── API Backend ─────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: insurance_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/insurance_db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - APP_NAME=AI Insurance Advisor
      - APP_VERSION=1.0.0
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./app:/app/app   # hot-reload in dev (remove in prod)

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: insurance_db
    environment:
      POSTGRES_DB: insurance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis Cache ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: insurance_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
