# Root-level compose file — supersedes both platform/docker-compose.yml and
# backend/docker-compose.yml, which are left in place only for reference /
# standalone local dev. This is the one to actually run: one Postgres
# ("db") shared by the agent's platform backend (api/worker) and the mobile
# backend (mobile-api, its own "mobile" schema in that same database) — see
# README.md. The agent's accident-intake chat is reachable only through
# `api`'s POST /chat/message (and, in the Flutter app, the floating agent
# chat bubble that calls it) — there is no separate Streamlit UI anymore.
#   cd /home/saoussen/insurance && docker compose up --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # Host-side ports only — containers reach MinIO via the internal
      # Docker network at "minio:9000" regardless of these, so bumping
      # them off the default 9000/9001 (commonly already taken by other
      # local services) doesn't affect the app at all.
      - "9002:9000"   # S3 API (host 9002 -> container 9000)
      - "9003:9001"   # web console (host 9003 -> container 9001)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./platform/backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: ${MINIO_SECURE}
      # LLM tool-use loop for /chat (see app/routers/chat.py, wraps assistant/)
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      LLM_MODEL: ${LLM_MODEL:-gemini-3.5-flash}
    ports:
      # Host 8010 -> container 8000 (host 8000 collided with another local
      # process). Container-internal port is unchanged, so worker/other
      # containers on the Docker network still reach this at "api:8000" if
      # ever needed. The Flutter app reaches this from the HOST, though, so
      # AGENT_API_URL in frontend/flutter_app/.env must match this host port.
      - "8010:8000"
    volumes:
      - ./platform/backend/app:/app/app
      # The agent chat endpoint (app/routers/chat.py) imports the assistant/
      # package for its LLM tool-use loop and constat PDF generation — one
      # source of truth, not copied into platform/backend/.
      - ./assistant:/app/assistant
      # Generated constat PDFs (assistant/db.py's save_generated_constat,
      # triggered from app/routers/chat.py) land under
      # platform/backend/generated_constats/ — give that its own volume so
      # saved constats survive a container restart instead of living only
      # in the ephemeral container filesystem.
      - ./platform/backend/generated_constats:/app/platform/backend/generated_constats
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Mobile app backend ───────────────────────────────────────────────────
  # Shares the SAME Postgres database as `api`/`worker` above (the "db"
  # service) — its own "mobile" schema inside it, set via
  # DB_SCHEMA, so its tables (users, conversations, messages, ...) can't
  # collide with the agent's same-named ones living in `public`. This is
  # the one-database goal: one Postgres instance/container, one
  # docker-compose, both backends attached to it.
  mobile-api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DB_SCHEMA: mobile
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${MOBILE_SECRET_KEY:-changeme-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      TOMTOM_API_KEY: ${TOMTOM_API_KEY:-}
      APP_NAME: AI Insurance Advisor
      APP_VERSION: 1.0.0
      DEBUG: "False"
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  # ── AssureX agency portal backend ────────────────────────────────────────
  # Shares the SAME Postgres database as `api`/`worker`/`mobile-api` above
  # (the "db" service) — its own "assurex" schema inside it, set via
  # DB_SCHEMA, so its tables (claims, users) can't collide with the other
  # backends' same-named ones living in `public` / `mobile`.
  assurex-api:
    build: ./assurex/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DB_SCHEMA: assurex
      SECRET_KEY: ${ASSUREX_SECRET_KEY:-changeme-in-production}
    ports:
      # The assurex-frontend container (below) reaches this from the HOST
      # at this port (it runs in the browser, not on the Docker network),
      # so VITE_API_BASE there must match it.
      - "8002:8000"
    volumes:
      - ./assurex/backend:/app
      # Mask the host's (Windows) venv/ inside the container instead of
      # bind-mounting it — the image already has its own installed deps.
      - /app/venv
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  # AssureX agency portal frontend (Vite dev server). Talks to assurex-api
  # over localhost:8002 from the BROWSER, not over the Docker network —
  # see VITE_API_BASE below and assurex/frontend/.env.example.
  assurex-frontend:
    build: ./assurex/frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE: http://localhost:8002/api
    ports:
      - "5173:5173"
    volumes:
      - ./assurex/frontend:/app
      # Mask node_modules so the image's own (Linux) install isn't
      # shadowed by the bind mount — same trick as assurex-api's venv mask.
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - assurex-api

  worker:
    build: ./platform/backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: ${MINIO_SECURE}
    volumes:
      - ./platform/backend/app:/app/app
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  minio_data:
